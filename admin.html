<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - Attendance</title>
  <style>
    body { font-family: Arial; background:#f4f6f9; padding:20px; }
    h2 { text-align:center; }
    table { width:100%; border-collapse:collapse; background:white; }
    th, td { padding:10px; border:1px solid #ccc; text-align:center; }
    th { background:#6a3254; color:white; }
  </style>
</head>
<body>

<h2>Attendance Admin Panel</h2>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Date</th>
      <th>Status</th>
      <th>Leave Type</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAwWqtyzIml5hlZpx4_R6IPhAHk7KJ121s",
    authDomain: "mats-ac2b5.firebaseapp.com",
    projectId: "mats-ac2b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const tableBody = document.getElementById("tableBody");

  async function loadAttendance() {
    const q = query(collection(db, "attendance"), orderBy("time", "desc"));
    const snapshot = await getDocs(q);

    tableBody.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      // ✅ Validate fields
      if (!data.name || !data.date || !data.status || !data.leaveType) return;

      const row = `
        <tr>
          <td>${data.name}</td>
          <td>${data.date}</td>
          <td>${data.status}</td>
          <td>${data.leaveType}</td>
          <td>${new Date(data.time).toLocaleString()}</td>
        </tr>
      `;
      tableBody.innerHTML += row;
    });
  }

  loadAttendance();
</script>

</body>
</html>
