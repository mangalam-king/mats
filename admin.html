<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    padding: 20px;
}
h1 {
    text-align: center;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-top: 20px;
}
th, td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}
th {
    background: #f0f0f0;
}
#loginBox, #adminPanel {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}
#logoutBtn {
    background: red;
    color: white;
    border: none;
    padding: 10px 20px;
    float: right;
    cursor: pointer;
}
.deleteBtn {
    background: crimson;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- Login Box -->
<div id="loginBox">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Enter Admin Password">
    <br><br>
    <button onclick="login()">Login</button>
</div>

<!-- Admin Panel -->
<div id="adminPanel" style="display:none;">
    <button id="logoutBtn" onclick="logout()">Logout</button>
    <h1>Admin Attendance Records</h1>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Date</th>
                <th>Status</th>
                <th>Leave Type</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="recordsTable"></tbody>
    </table>
</div>

<script>
const ADMIN_PASSWORD = "12345";   // Change password if needed

function login() {
    const pass = document.getElementById("password").value;

    if (pass === ADMIN_PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        loadRecords();
    } else {
        alert("Wrong password!");
    }
}

function logout() {
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("password").value = "";
}

function loadRecords() {
    let records = JSON.parse(localStorage.getItem("adminAttendanceRecords")) || [];
    const table = document.getElementById("recordsTable");

    table.innerHTML = "";

    records.forEach((r, index) => {
        const row = `
            <tr>
                <td>${r.name}</td>
                <td>${r.date}</td>
                <td>${r.status}</td>
                <td>${r.leaveType}</td>
                <td><button class="deleteBtn" onclick="deleteRecord(${index})">Delete</button></td>
            </tr>
        `;
        table.innerHTML += row;
    });
}

function deleteRecord(index) {
    let records = JSON.parse(localStorage.getItem("adminAttendanceRecords")) || [];

    if (confirm("Are you sure you want to delete this record?")) {
        records.splice(index, 1);
        localStorage.setItem("adminAttendanceRecords", JSON.stringify(records));
        loadRecords();
    }
}
</script>

</body>
</html>
