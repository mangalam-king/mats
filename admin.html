<!DOCTYPE html>
<html>
<head>
  <title>Attendance Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #6a5acd;
      color: white;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }
  </style>
</head>

<body>

<h2>Attendance Records</h2>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Date</th>
      <th>Status</th>
      <th>Leave Type</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAwWqtyzIml5hlZpx4_R6IPhAHk7KJ121s",
    authDomain: "mats-ac2b5.firebaseapp.com",
    projectId: "mats-ac2b5",
    storageBucket: "mats-ac2b5.firebasestorage.app",
    messagingSenderId: "33615427220",
    appId: "1:33615427220:web:b83025c444656aaa972681"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const tableBody = document.getElementById("tableBody");

  async function loadData() {
    const querySnapshot = await getDocs(collection(db, "attendance"));

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      const row = `
        <tr>
          <td>${data.name}</td>
          <td>${data.date}</td>
          <td>${data.status}</td>
          <td>${data.leaveType}</td>
          <td>${new Date(data.time.seconds * 1000).toLocaleString()}</td>
        </tr>
      `;

      tableBody.innerHTML += row;
    });
  }

  loadData();
</script>

</body>
</html>
