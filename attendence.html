<!DOCTYPE html>
<html>
<head>
  <title>Attendance Form</title>
</head>
<body>

<h2>Attendance Form</h2>

<form id="attendanceForm">
  <input type="text" id="name" placeholder="Name" required><br><br>
  <input type="date" id="date" required><br><br>

  <select id="status" required>
    <option value="">Select Status</option>
    <option>Present</option>
    <option>Absent</option>
    <option>Leave</option>
  </select><br><br>

  <select id="leaveType" required>
    <option value="">Leave Type</option>
    <option>Normal Leave</option>
    <option>Emergency Leave</option>
    <option>Education Leave</option>
    <option>None</option>
  </select><br><br>

  <button type="submit">Submit</button>
</form>

<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional

    apiKey: "AIzaSyAwWqtyzIml5hlZpx4_R6IPhAHk7KJ121s",
    authDomain: "mats-ac2b5.firebaseapp.com",
    projectId: "mats-ac2b5",
    storageBucket: "mats-ac2b5.firebasestorage.app",
    messagingSenderId: "33615427220",
    appId: "1:33615427220:web:b83025c444656aaa972681",
    measurementId: "G-XBJMB2QGF9"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app); 

  const form = document.getElementById("attendanceForm");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    await addDoc(collection(db, "attendance"), {
      name: name.value,
      date: date.value,
      status: status.value,
      leaveType: leaveType.value,
      time: new Date()
    });

    alert("Attendance saved!");
    form.reset();
  });
</script>

</body>
</html>
