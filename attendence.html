<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Submission</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    padding: 20px;
}
h1, h2 {
    text-align: center;
}
form {
    background: white;
    padding: 20px;
    max-width: 400px;
    margin: auto;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}
input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
button {
    background: #28a745;
    color: white;
    border: none;
    cursor: pointer;
}
button:hover {
    background: #218838;
}
</style>
</head>

<body>

<h1>WELCOME TO M.A.T.S. WEBPAGE</h1>
<h2>Attendance & Leave Form</h2>

<form id="submit-to-google-sheet">

    <input type="text" name="name" id="name" placeholder="Enter Name" required>

    <input type="date" name="date" id="date" required>

    <select name="status" id="status" required>
        <option value="">Select Status</option>
        <option value="Present">Present</option>
        <option value="Absent">Absent</option>
        <option value="Leave">Leave</option>
    </select>

    <select name="leaveType" id="leaveType" required>
        <option value="">Select Leave Type</option>
        <option value="Normal Leave">Normal Leave</option>
        <option value="Emergency Leave">Emergency Leave</option>
        <option value="Education Leave">Education Leave</option>
        <option value="None">None</option>
    </select>

    <button type="submit">Submit Attendance</button>

</form>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@7.12.15/dist/sweetalert2.all.min.js"></script>

<script>
const scriptURL =
"https://script.google.com/macros/s/AKfycbxdjgWEyDsfGNozG-55B6S77M0v8UeqLzA_xr___fHF091GFaYm-K8UhARlYn0FgpKRlg/exec";

const form = document.getElementById("submit-to-google-sheet");
const dateInput = document.getElementById("date");

// Only allow today's date
const today = new Date().toISOString().split("T")[0];
dateInput.value = today;
dateInput.min = today;
dateInput.max = today;

form.addEventListener("submit", function(e) {
    e.preventDefault();

    var formData = new FormData(form);

    fetch(scriptURL, { method: "POST", body: formData })
        .then(response => {
            swal("Done", "Attendance Submitted Successfully.", "success");
            form.reset();
            dateInput.value = today;
        })
        .catch(error => {
            swal("Error", "Something went wrong. Please try again!", "error");
        });
});
</script>

</body>
</html>
