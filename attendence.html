<!DOCTYPE html>
<html>
<head>
  <title>Attendance Form</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 25px 30px;
      width: 350px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6a5acd;
    }

    button {
      background: #6a5acd;
      color: white;
      border: none;
      margin-top: 20px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #5941c9;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Attendance Form</h2>

  <form id="attendanceForm">

    <input type="text" id="name" placeholder="Enter Name" required>

    <input type="date" id="date" required>

    <select id="status" required>
      <option value="">Select Status</option>
      <option>Present</option>
      <option>Absent</option>
      <option>Leave</option>
    </select>

    <select id="leaveType" required>
      <option value="">Leave Type</option>
      <option>Normal Leave</option>
      <option>Emergency Leave</option>
      <option>Education Leave</option>
      <option>None</option>
    </select>

    <button type="submit">Submit Attendance</button>

  </form>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAwWqtyzIml5hlZpx4_R6IPhAHk7KJ121s",
    authDomain: "mats-ac2b5.firebaseapp.com",
    projectId: "mats-ac2b5",
    storageBucket: "mats-ac2b5.firebasestorage.app",
    messagingSenderId: "33615427220",
    appId: "1:33615427220:web:b83025c444656aaa972681"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.getElementById("attendanceForm");
  const dateInput = document.getElementById("date");

  // Allow only today's date
  const today = new Date().toISOString().split("T")[0];
  dateInput.value = today;
  dateInput.min = today;
  dateInput.max = today;

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
      await addDoc(collection(db, "attendance"), {
        name: name.value,
        date: dateInput.value,
        status: status.value,
        leaveType: leaveType.value,
        time: new Date()
      });

      alert("Attendance saved successfully!");
      form.reset();
      dateInput.value = today;

    } catch (error) {
      alert("Error saving data: " + error.message);
    }
  });
</script>

</body>
</html>
