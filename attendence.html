<!DOCTYPE html>
<html>
<head>
  <title>Attendance Form</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }
    h2 {
      text-align: center;
    }
    form {
      background: white;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: #6a3254;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Attendance Form</h2>

<form id="attendanceForm">
  <input type="text" id="name" placeholder="Enter Name" required>

  <input type="date" id="date" required>

  <select id="status" required>
    <option value="">Select Status</option>
    <option>Present</option>
    <option>Absent</option>
    <option>Leave</option>
  </select>

  <select id="leaveType" required>
    <option value="">Leave Type</option>
    <option>Normal Leave</option>
    <option>Emergency Leave</option>
    <option>Education Leave</option>
    <option>None</option>
  </select>

  <button type="submit">Submit Attendance</button>
</form>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    query,
    where,
    getDocs
  } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  // 🔹 Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAwWqtyzIml5hlZpx4_R6IPhAHk7KJ121s",
    authDomain: "mats-ac2b5.firebaseapp.com",
    projectId: "mats-ac2b5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.getElementById("attendanceForm");
  const dateInput = document.getElementById("date");

  // 🔹 Allow only today's date
  const today = new Date().toISOString().split("T")[0];
  dateInput.value = today;
  dateInput.min = today;
  dateInput.max = today;

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const status = document.getElementById("status").value;
    const leaveType = document.getElementById("leaveType").value;

    try {
      // 🔍 CHECK: Has this user already submitted today?
      const q = query(
        collection(db, "attendance"),
        where("name", "==", name),
        where("date", "==", today)
      );

      const snapshot = await getDocs(q);

      if (!snapshot.empty) {
        alert("❌ You have already submitted attendance for today!");
        return;
      }

      // ✅ SAVE attendance
      await addDoc(collection(db, "attendance"), {
        name: name,
        date: today,
        status: status,
        leaveType: leaveType,
        time: new Date().toISOString()
      });

      alert("✅ Attendance submitted successfully!");
      form.reset();
      dateInput.value = today;

    } catch (error) {
      alert("❌ Error saving data: " + error.message);
    }
  });
</script>

</body>
</html>
