<!DOCTYPE html>
<html>
<head>
  <title>Attendance Form</title>
</head>
<body>

<h2>Attendance Form</h2>

<form id="attendanceForm">
  <input type="text" id="name" placeholder="Name" required><br><br>
  <input type="date" id="date" required><br><br>

  <select id="status" required>
    <option value="">Select Status</option>
    <option>Present</option>
    <option>Absent</option>
    <option>Leave</option>
  </select><br><br>

  <select id="leaveType" required>
    <option value="">Leave Type</option>
    <option>Normal Leave</option>
    <option>Emergency Leave</option>
    <option>Education Leave</option>
    <option>None</option>
  </select><br><br>

  <button type="submit">Submit</button>
</form>

<script type="module">
  // Import Firebase SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  // Your Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyAwWqtyzIml5hlZpx4_R6IPhAHk7KJ121s",
    authDomain: "mats-ac2b5.firebaseapp.com",
    projectId: "mats-ac2b5",
    storageBucket: "mats-ac2b5.firebasestorage.app",
    messagingSenderId: "33615427220",
    appId: "1:33615427220:web:b83025c444656aaa972681",
    measurementId: "G-XBJMB2QGF9"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.getElementById("attendanceForm");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
      await addDoc(collection(db, "attendance"), {
        name: document.getElementById("name").value,
        date: document.getElementById("date").value,
        status: document.getElementById("status").value,
        leaveType: document.getElementById("leaveType").value,
        time: new Date()
      });

      alert("Attendance saved successfully!");
      form.reset();

    } catch (error) {
      alert("Error saving data: " + error.message);
    }
  });
</script>

</body>
</html>
