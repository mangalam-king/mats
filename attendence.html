<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance & Leave System</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    padding: 20px;
}
h1, h2 {
    text-align: center;
}
form {
    background: white;
    padding: 20px;
    max-width: 400px;
    margin: auto;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}
input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div style="text-align:center;">
    <img src="logo2.png" alt="Logo">
</div>

<h1>WELCOME TO M.A.T.S. WEBPAGE</h1>

<div style="text-align:center; background-color: yellow; color: #6a3254; padding:15px; font-size:20px">
    <a href="index.html">HOME</a>
    <a href="admin.html" style="margin-left:20px;">ADMIN PANEL</a>
</div>

<h2>
Hi!! Madhavan <br>
Fill today's attendance form
</h2>

<hr>

<h2>Attendance & Leave Form</h2>

<form id="attendanceForm">
    <input type="text" id="name" placeholder="Enter Name" required>

    <input type="date" id="date" required>

    <select id="status" required>
        <option value="">Select Status</option>
        <option value="Present">Present</option>
        <option value="Absent">Absent</option>
        <option value="Leave">Leave</option>
    </select>

    <select id="leaveType" required>
        <option value="">Select Leave Type</option>
        <option value="Normal Leave">Normal Leave</option>
        <option value="Emergency Leave">Emergency Leave</option>
        <option value="Education Leave">Education Leave</option>
        <option value="None">None</option>
    </select>

    <button type="submit">Submit Attendance</button>
</form>

<script>
const form = document.getElementById("attendanceForm");
const dateInput = document.getElementById("date");

// ✅ Allowed users list
const allowedUsers = [
    "Nanu",
    "Om",
    "Rudra",
    "Shiv"
];  // Add your allowed names here

// Allow only today's date
const today = new Date().toISOString().split("T")[0];
dateInput.value = today;
dateInput.min = today;
dateInput.max = today;

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const date = document.getElementById("date").value;
    const status = document.getElementById("status").value;
    const leaveType = document.getElementById("leaveType").value;

    // ✅ Check allowed users
    if (!allowedUsers.includes(name)) {
        alert("This name is not registered. Please enter a valid user name.");
        return;
    }

    if (date !== today) {
        alert("You can only submit today's attendance!");
        return;
    }

    // Save for admin panel
    let records = JSON.parse(localStorage.getItem("adminAttendanceRecords")) || [];

    const record = { name, date, status, leaveType };
    records.push(record);

    localStorage.setItem("adminAttendanceRecords", JSON.stringify(records));

    alert("Attendance submitted successfully!");

    form.reset();
    dateInput.value = today;
});
</script>



</body>
</html>
