<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="error" id="error"></div>
</div>

<script>
    // Multiple users
    const users = [
        { username: "rudra", password: "rudra123", page: "attendence.html" },
        { username: "nanu1", password: "nanu123", page: "attendence.html" },
        { username: "om", password: "om123", page: "attendence.html" },
        { username: "shiv", password: "shiv123", page: "attendence.html" },
        { username: "madh", password: "madh123", page: "attendence.html" },
        { username: "ms1313", password: "ms1313", page: "admin.html" }
    ];

    function login() {
        const uname = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        const user = users.find(
            u => u.username === uname && u.password === pass
        );

        if (user) {
            window.location.href = user.page;
        } else {
            document.getElementById("error").innerText =
                "Invalid username or password";
        }
    }
</script>

</body>

</html>
