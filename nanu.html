<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance & Leave Calendar</title>
    <style>
        :root {
            --present-color: #4CAF50;
            --leave-color: #f44336;
            --bg-color: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
        
        .calendar-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        
        .day-name { font-weight: bold; color: #888; font-size: 0.8rem; margin-bottom: 10px; }

        .day { padding: 10px; cursor: pointer; border-radius: 5px; transition: 0.2s; font-size: 0.9rem; border: 1px solid #eee; }
        .day:hover { background-color: #e0e0e0; }
        .day.today { border: 2px solid #2196F3; font-weight: bold; }

        /* Attendance Styles */
        .present { background-color: var(--present-color) !important; color: white; }
        .leave { background-color: var(--leave-color) !important; color: white; }

        /* Controls */
        .controls { margin-top: 20px; border-top: 1px solid #eee; pt: 15px; font-size: 0.8rem; }
        .legend { display: flex; gap: 10px; margin-top: 10px; }
        .legend span { display: flex; align-items: center; gap: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="calendar-container">
    <div class="calendar-header">
        <button onclick="changeMonth(-1)">❮</button>
        <h3 id="monthDisplay"></h3>
        <button onclick="changeMonth(1)">❯</button>
    </div>

    <div class="days-grid" id="daysGrid">
        <div class="day-name">Sun</div><div class="day-name">Mon</div><div class="day-name">Tue</div>
        <div class="day-name">Wed</div><div class="day-name">Thu</div><div class="day-name">Fri</div>
        <div class="day-name">Sat</div>
        </div>

    <div class="controls">
        <p><strong>Click a date to toggle status:</strong></p>
        <div class="legend">
            <span><div class="dot" style="background: var(--present-color)"></div> Present</span>
            <span><div class="dot" style="background: var(--leave-color)"></div> Leave</span>
            <span><div class="dot" style="background: #eee; border:1px solid #ccc"></div> Neutral</span>
        </div>
    </div>
</div>

<script>
    let date = new Date();
    // Storage object to keep track of attendance (Key: YYYY-MM-DD)
    const attendanceData = JSON.parse(localStorage.getItem('attendance')) || {};

    function renderCalendar() {
        const monthDisplay = document.getElementById('monthDisplay');
        const daysGrid = document.getElementById('daysGrid');
        
        // Clear previous dates (keep day names)
        const dayNames = document.querySelectorAll('.day-name');
        daysGrid.innerHTML = '';
        dayNames.forEach(d => daysGrid.appendChild(d));

        const year = date.getFullYear();
        const month = date.getMonth();
        
        monthDisplay.innerText = `${new Intl.DateTimeFormat('en-US', { month: 'long' }).format(date)} ${year}`;

        const firstDay = new Date(year, month, 1).getDay();
        const lastDay = new Date(year, month + 1, 0).getDate();

        // Add empty slots for previous month
        for (let i = 0; i < firstDay; i++) {
            const emptyDiv = document.createElement('div');
            daysGrid.appendChild(emptyDiv);
        }

        // Add actual days
        for (let i = 1; i <= lastDay; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.classList.add('day');
            dayDiv.innerText = i;
            
            const dateStr = `${year}-${month + 1}-${i}`;
            
            // Check if it's today
            const today = new Date();
            if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                dayDiv.classList.add('today');
            }

            // Apply saved status
            if (attendanceData[dateStr]) {
                dayDiv.classList.add(attendanceData[dateStr]);
            }

            // Click event to cycle status: Neutral -> Present -> Leave -> Neutral
            dayDiv.onclick = () => {
                if (dayDiv.classList.contains('present')) {
                    dayDiv.classList.remove('present');
                    dayDiv.classList.add('leave');
                    attendanceData[dateStr] = 'leave';
                } else if (dayDiv.classList.contains('leave')) {
                    dayDiv.classList.remove('leave');
                    delete attendanceData[dateStr];
                } else {
                    dayDiv.classList.add('present');
                    attendanceData[dateStr] = 'present';
                }
                localStorage.setItem('attendance', JSON.stringify(attendanceData));
            };

            daysGrid.appendChild(dayDiv);
        }
    }

    function changeMonth(delta) {
        date.setMonth(date.getMonth() + delta);
        renderCalendar();
    }

    renderCalendar();
</script>

</body>
</html>
