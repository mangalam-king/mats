<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>M.A.T.S Webpage</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

.header {
    text-align: center;
    padding: 20px;
    background: white;
}

.header img {
    width: 120px;
}

h1 {
    color: #6a3254;
}

.nav {
    text-align: center;
    background: yellow;
    padding: 15px;
    font-size: 20px;
}

.nav a {
    text-decoration: none;
    color: #6a3254;
    margin: 0 20px;
    font-weight: bold;
}

.container {
    max-width: 700px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}

label {
    font-weight: bold;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
}

button {
    background: #6a3254;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #532445;
}

.footer {
    text-align: center;
    padding: 20px;
    background: yellow;
    font-size: 18px;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
    <img src="logo2.png">
    <h1>WELCOME TO M.A.T.S. WEBPAGE</h1>
</div>

<!-- Navigation -->
<div class="nav">
    <a href="index.html">Home Page</a>
    <a href="Read More.html">Read More & Contact</a>
</div>

<!-- Order Form -->
<div class="container">
    <h2>Order Registration</h2>

    <form action="https://formspree.io/f/meorjqoe" method="POST" id="myForm">

        <label>Name:</label>
        <input type="text" name="name">

        <label>Phone no.:</label>
        <input type="tel" name="Phone no.">

        <label>Item:</label>
        <input type="text" name="Item">

        <label>Quantity:</label>
        <input type="number" name="Quantity">

        <label>Address:</label>
        <input type="text" name="Address">

        <label>Email (optional):</label>
        <input type="email" name="Email">

        <button type="submit">Register Order</button>
    </form>
</div>

<!-- Enquiry Form -->
<div class="container">
    <h2>For Enquiry in MATS</h2>

    <form action="https://formspree.io/f/meorjqoe" method="POST">

        <label>Name:</label>
        <input type="text" name="name">

        <label>Phone no.:</label>
        <input type="tel" name="Phone no.">

        <label>DOB:</label>
        <input type="date" name="DOB">

        <label>Father's Name:</label>
        <input type="text" name="FATHERS NAME">

        <label>Address:</label>
        <input type="text" name="Address">

        <label>Email:</label>
        <input type="email" name="Email">

        <button type="submit">Register Information</button>
    </form>
</div>

<!-- Footer -->
<div class="footer">
    <a href="Read More.html">Read More & Contact</a>
</div>

</body>
</html>
